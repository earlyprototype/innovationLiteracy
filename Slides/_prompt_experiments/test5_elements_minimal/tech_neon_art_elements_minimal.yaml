# tech_neon_art_elements_minimal.yaml
# Element Learning Slides - Ultra-concise

language: "British English"
tone: "Avant-garde technical"

colours:
  background: "Warm beige (#E0E0D0)"
  text: "Charcoal (#333333)"
  accent: "Neon yellow (#DFFF00)"
  grid: "Thin grey"

typography: "Mixed serif/sans-serif. Small body on grid. Typewriter numerals."

layouts:
  title: "Grid backdrop (#E0E0D0). Large serif element name left. Tiny metadata (Element 01/11, The What). Monochrome profile cutout in yellow (#DFFF00) circle. Concentric target overlay."
  definition: "Grid (#E0E0D0). Bold one-line statement. Yellow (#DFFF00) geometric shapes (hexagon/square/triangle) with keywords. Leader line annotations."
  practice: "3-part collage (#E0E0D0). Monochrome workshop photos cutout. Yellow (#DFFF00) arrows show flow. Technical labels (01. EMPATHISE)."
  distinctions: "Vertical split (#E0E0D0). Left: target element wireframe. Right: confused element wireframe. Yellow (#DFFF00) highlights show differences. Technical boundary notes."

rules:
  - "3 colours: beige (#E0E0D0) background, monochrome photos, yellow (#DFFF00) shapes"
  - "Photos always cutout, never rectangular"
  - "Layer: grid → yellow (#DFFF00) shapes → photos → text"
