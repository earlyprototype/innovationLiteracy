# presentation_design_spec_neon_collage_jp_elements.yaml
# スタイル: 設計 / テックアート / アバンギャルド
# コンセプト: 知性を感じる設計図、アートテイスト
# 最適化: Element Learning Slides

全体デザイン設定:
  言語: "英国英語"
  トーン: "前衛的、構築的、知的、アート、未来志向"
  ビジュアル・アイデンティティ:
    背景色: "ウォームグレー / ベージュ (#E0E0D0) - 紙のようなマットな質感"
    文字色: "チャコールグレー (#333333) - 真っ黒ではない"
    アクセントカラー: "ネオンイエロー (#DFFF00) - 幾何学図形に使用"
    ライン色: "極細のグレー線 - 設計図のような補助線"
  タイポグラフィ:
    見出し: "セリフ体とサンセリフ体の混在。"
    本文: "小さなサイズで、グリッドに沿って配置。"
    数字: "タイプライター風のフォントを使用。"

スライド構成パターン:
  タイトルカード: "背景色はウォームグレー/ベージュ (#E0E0D0)、方眼グリッド。要素名を大きなセリフ体で左側に配置。『Element 01 of 11』『The What』といったメタ情報を極小タイポグラフィで記述。人物の横顔写真をモノクロで切り抜き、ネオンイエロー (#DFFF00) の正円で囲む。同心円ターゲットを顔の中心に重ねる。"
  定義: "背景色はウォームグレー/ベージュ (#E0E0D0)、細かいグリッド。一行定義文を太字で配置。概念を幾何学図形で抽象化：ネオンイエロー (#DFFF00) の正六角形、正方形、三角形を組み合わせ、中心に定義のキーワードを配置。引き出し線で各キーワードを注釈。"
  実践例: "背景色はウォームグレー/ベージュ (#E0E0D0)。ワークショップの実際の場面を3分割コラージュで表現。モノクロ写真を切り抜き配置、ネオンイエロー (#DFFF00) の矢印や図形で動きや関係性を示す。各写真に『01. EMPATHISE』『02. PROTOTYPE』のような技術図面風のラベル。"
  境界区別: "背景色はウォームグレー/ベージュ (#E0E0D0)。画面を左右に分割する極細の縦線。左側に対象要素、右側に混同されやすい隣接要素。それぞれをワイヤーフレームの構造図で描写。違いを示すネオンイエロー (#DFFF00) のハイライトや×印。テクニカルな注釈文で境界を明示。"

デザインルール:
  - "色の限定": "『ウォームグレー/ベージュ (#E0E0D0) - 背景』『モノクロ（写真）』『ネオンイエロー (#DFFF00) - 図形』の3色構成を厳守。"
  - "コラージュ": "写真は四角く置かず、必ず『切り抜き（Cut-out）』処理をして、背景に溶け込ませる。"
  - "レイヤー": "「背景のグリッド線」→「ネオンイエロー (#DFFF00) 図形」→「モノクロ写真」→「前面の文字」という順序で重ねる。"
