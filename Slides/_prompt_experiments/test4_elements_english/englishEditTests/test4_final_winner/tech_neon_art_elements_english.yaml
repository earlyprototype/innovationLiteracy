# presentation_design_spec_neon_collage_elements_english.yaml
# Style: Design / Tech Art / Avant-garde
# Concept: Intelligent design drawings, art aesthetic
# Optimised: Element Learning Slides - Standalone Reference Material

overall_design_settings:
  language: "British English"
  tone: "Avant-garde, structural, intelligent, art and design, innovation, future-oriented"
  visual_identity:
    default_background_colour: "#E0E0D0 - Paper-like matte texture"
    default_text_colour: "Charcoal grey (#333333) - Not pure black"
    default_accent_colour: "Neon yellow (#DFFF00) - Used for geometric shapes"
    default_line_colour: "Ultra-thin grey lines - Blueprint-like auxiliary lines"
  typography:
    default_headings: "Mix of serif and sans-serif typefaces."
    default_body_text: "Small size, positioned along grid."
    default_numbers: "Typewriter-style font."
    
content_approach:
  primary_source: "Element definition files (What is [Element].md)"
  secondary_context: "Workshop examples only when explicitly relevant"
  standalone_quality: "Slides must be comprehensible without workshop participation"
  reference_material: "Designed for take-away learning and future reference"

slide[number]_composition_patterns:
  [1] title_card: "default_background colour (no grid). Element name in large serif on left. Metadata ('Element 01 of 11', 'The What') in small typography. Monochrome profile photo cutout, enclosed by neon yellow (#DFFF00) circle. Concentric target overlay on face centre."
  
  [2] definition: "default_background colour with equal spaced fine grid (vertical and horizontal). One-line definition statement in bold. Concept abstracted geometrically: neon yellow (#DFFF00) outines, combined with definition keywords at centre. Leader lines annotate each keyword. Clean architectural diagram style."
  
  [3] why_it_matters: "default_background colour with equal spaced fine grid (vertical and horizontal). Split visual. Left side: chaos scenario (arrows everywhere, misalignment). Right side: clarity scenario (structured flow, alignment). Neon yellow (#DFFF00) used to show contrast and highlight benefits. Clean before/after narrative. Minimal elements, maximum clarity."
  
  [4] in_practice: "default_background colour with fine grid. both frameworks shown side-by-side. Each depicted as structural diagram. Neon yellow (#DFFF00) highlights commonalities or key features. Technical drawing style labels. Emphasis on structural patterns, not specific workshop moments."
  
  [5] key_distinctions: "default_background colour with fine grid. Screen split by ultra-thin vertical line. Left side: target element. Right side: commonly confused adjacent element. Each depicted as wireframe structural diagram. Neon yellow (#DFFF00) highlights or × marks show differences. Technical annotations clarify boundaries."

  [6] further_learning: "default_background colour with no grid. Further learning opportunities as hierarchical list. Top section: key frameworks and resources. Bottom section: forward pointer to next element. Each item with neon yellow (#DFFF00) bullet point or geometric marker. Small typography. QR codes or short URLs optional. Professional reference aesthetic—take-away resource card."

design_rules:
  - colour_limitation: "Strictly adhere to 3-colour composition: warm grey/beige (#E0E0D0) - default_background colour, monochrome (photos), neon yellow (#DFFF00) - shapes."
  - collage: "Never place photos as rectangles; always process as cutouts and blend into background."
  - layering: "Layer in order: background (plus grid) → neon yellow (#DFFF00) shapes → monochrome photos → foreground text."
  - standalone_comprehension: "Each slide must be understandable without external context. Avoid workshop-specific references unless source material explicitly mentions them."
  - source_fidelity: "Prioritise Element definition files as primary authority. Draw concepts, language, and structure from source material first."
