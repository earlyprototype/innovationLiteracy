# presentation_design_spec_neon_collage_elements_english.yaml
# Style: Design / Tech Art / Avant-garde
# Concept: Intelligent design drawings, art aesthetic
# Optimised: Element Learning Slides

overall_design_settings:
  language: "British English"
  tone: "Avant-garde, structural, intelligent, art and design, innovation, future-oriented"
  visual_identity:
    defaul_background_colour: " #E0E0D0 - Paper-like matte texture"
    default_text_colour: "Charcoal grey (#333333) - Not pure black"
    default_accent_colour: "Neon yellow (#DFFF00) - Used for geometric shapes"
    default_line_colour: "Ultra-thin grey lines - Blueprint-like auxiliary lines"
  typography:
    default_headings: "Mix of serif and sans-serif typefaces."
    default_body_text: "Small size, positioned along grid."
    default_numbers: "Typewriter-style font."
    

slide[number]_composition_patterns:
  [1] title_card: 
  default_background colour. 
  Element name in large serif on left. 
  Metadata ('Element 01 of 11', 'The What') in small typography. Monochrome profile photo cutout, enclosed by neon yellow (#DFFF00) circle. Concentric target overlay on face centre.
  
  [2] definition: 
  default_background colour with fine grid. 
  One-line definition statement in bold. 
  Concept abstracted as geometric shapes: neon yellow (#DFFF00) hexagon, square, triangle combined with definition keywords at centre. Leader lines annotate each keyword."
  
  [3] in_practice: 
  default_background colour with fine grid. 
  Workshop scenes as multi-part collage. Monochrome photo cutouts positioned, neon yellow (#DFFF00) arrows and shapes show movement and relationships. Each photo labelled with technical drawing style ('01. EMPATHISE', '02. PROTOTYPE')."
  
  [4]key_distinctions: 
  default_background colour with fine grid.  
  Screen split by ultra-thin vertical line. 
  Left side: target element. Right side: commonly confused adjacent element. Each depicted as wireframe structural diagram. Neon yellow (#DFFF00) highlights or × marks show differences. Technical annotations clarify boundaries."

  [5]further_learning:
  default_background colour with fine grid.
  Further learning opportunities as list.
  Each item as a neon yellow (#DFFF00) bullet point.
  Each item as a small typography.



design_rules:
  - colour_limitation: Strictly adhere to 3-colour composition: warm grey/beige (#E0E0D0) -   default_background colour, monochrome (photos), neon yellow (#DFFF00) - shapes.
  - collage: Never place photos as rectangles; always process as cutouts and blend into background.
  - layering: Layer in order: background (plus grid) → neon yellow (#DFFF00) shapes → monochrome photos → foreground text.
