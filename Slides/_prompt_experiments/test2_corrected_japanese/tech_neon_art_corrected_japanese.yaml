# presentation_design_spec_neon_collage_jp_corrected.yaml
# スタイル: 設計 / テックアート / アバンギャルド
# コンセプト: 知性を感じる設計図、アートテイスト

全体デザイン設定:
  言語: "英国英語"
  トーン: "前衛的、構築的、知的、アート、未来志向"
  ビジュアル・アイデンティティ:
    背景色: "ウォームグレー / ベージュ (#E0E0D0) - 紙のようなマットな質感"
    文字色: "チャコールグレー (#333333) - 真っ黒ではない"
    アクセントカラー: "ネオンイエロー (#DFFF00) - 幾何学図形に使用"
    ライン色: "極細のグレー線 - 設計図のような補助線"
  タイポグラフィ:
    見出し: "セリフ体とサンセリフ体の混在。"
    本文: "小さなサイズで、グリッドに沿って配置。"
    数字: "タイプライター風のフォントを使用。"

スライド構成パターン:
  表紙（トリプル・コラージュ）: "画面を3分割するグリッド線。人物の顔写真をモノクロにし、切り抜いて配置。人物の背後や手前にアクセントカラーの『円』や『四角形』を重ねる。同心円（ターゲットスコープのような線画）を人物の中心に配置。背景色はウォームグレー/ベージュ (#E0E0D0)。"
  分析（テクニカル・ドローイング）: "背景色はウォームグレー/ベージュ (#E0E0D0)、方眼紙のような細かいグリッド。製品や概念を線画（ワイヤーフレーム）で描き、一部をアクセントカラーで塗りつぶす。極細の引き出し線を伸ばし、図面のように詳細を記述。"
  プロセス（幾何学コネクション）: "背景色はウォームグレー/ベージュ (#E0E0D0)。アクセントカラーの正円、正方形、三角形を配置。点線や破線で図形をつなぎ、論理的な流れを表現。図形の一部をマスクとして使い、モノクロ写真を中に埋め込む。"
  データ（レーダーチャート・アート）: "背景色はウォームグレー/ベージュ (#E0E0D0)。蜘蛛の巣のようなレーダーチャートを画面いっぱいに配置。アクセントカラーの太線でデータを描画。古い地図や設計図のようなテクスチャを薄く背景に重ねる。"

デザインルール:
  - "色の限定": "『ウォームグレー/ベージュ (#E0E0D0) - 背景』『モノクロ（写真）』『アクセントカラー（図形）』の3色構成を厳守。"
  - "コラージュ": "写真は四角く置かず、必ず『切り抜き（Cut-out）』処理をして、背景に溶け込ませる。"
  - "レイヤー": "「背景のグリッド線」→「アクセント図形」→「モノクロ写真」→「前面の文字」という順序で重ねる。"
